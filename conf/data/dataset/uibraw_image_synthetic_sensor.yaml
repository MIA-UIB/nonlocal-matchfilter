train:
  selected:
    - uibraw
  uibraw:
    _target_: nonlocal_matchfilter.data.image_datasets.SyntheticUIBRawSelection
    _partial_: True
    root: ${oc.env:RAW_DATASETS_PATH}/UIB_RAW/
    split: train
    load_upfront: True
    synthesis_seed: null
    synthesis:
      _target_: nonlocal_matchfilter.data.transforms.SensorNoise
      _partial_: True
      concat_std_map: True
      no_noise: False
      clip: True
      p: 1.0
val:
  selected:
    - uibraw
  uibraw:
    _target_: nonlocal_matchfilter.data.image_datasets.SyntheticUIBRawSelection
    _partial_: True
    root: ${oc.env:RAW_DATASETS_PATH}/UIB_RAW/
    split: val
    load_upfront: True
    synthesis_seed: 7390686
    synthesis:
      _target_: nonlocal_matchfilter.data.transforms.SensorNoise
      _partial_: True
      concat_std_map: True
      no_noise: False
      clip: True
      p: 1.0
test:
